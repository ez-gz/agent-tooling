name: Update manifest

on:
  push:
    branches: [main]
    paths-ignore:
      - manifest.json  # prevents re-trigger when this action commits the result

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log dates

      - name: Generate manifest.json
        run: python3 .github/scripts/generate-manifest.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --staged --quiet; then
            echo "manifest.json unchanged, nothing to commit"
          else
            git commit -m "chore: regenerate manifest.json [skip ci]"
            git push
          fi
